<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile · Chico Archive</title>
  <link rel="icon" type="image/jpeg" href="./assets/favicon.jpg" />

  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="site-header">
    <img
      src="./assets/main_page_image.jpg"
      alt="Main Page Image"
      class="main-page-image"
    />

    <nav class="page-nav" aria-label="Main navigation">
      <a href="./index.html" class="nav-link">MAIN</a>
      <span class="nav-dot">·</span>
      <a href="./explore.html" class="nav-link">EXPLORE</a>
      <span class="nav-dot">·</span>
      <a href="./profile.html" class="nav-link active">PROFILE</a>
    </nav>
  </header>

  <main>
    <section class="page-section profile-section">
      <div class="profile-intro">
        <p class="profile-handle">CHICO (치코)</p>
        <p class="profile-nickname">@chiconyanya</p>
        <a
          class="profile-instagram-link"
          href="https://www.instagram.com/chiconyanya/"
          target="_blank"
          rel="noopener noreferrer"
        >Instagram</a>
      </div>

      <div class="profile-exhibitions">
        <article class="profile-exhibition-card">
          <img
            src="./assets/profile/pic_suwon.jpg"
            alt="수일코 2026 부스 사진"
            class="profile-exhibition-image"
            loading="lazy"
          />
          <div class="profile-exhibition-info">
            <h3 class="profile-exhibition-name">수일코 H-108</h3>
            <p class="profile-exhibition-detail">2026 수원 일러스트코리아 Summer</p>
            <p class="profile-exhibition-detail">2026.06.05(금) - 06.07(일)</p>
            <p class="profile-exhibition-detail">수원메쎄</p>
          </div>
        </article>

        <article class="profile-exhibition-card profile-exhibition-card-clickable" id="munguCard">
          <img
            src="./assets/profile/pic_mungu.jpg"
            alt="문구전 2026 여름 부스 사진"
            class="profile-exhibition-image"
            loading="lazy"
          />
          <div class="profile-exhibition-info">
            <h3 class="profile-exhibition-name">문구전 CV06</h3>
            <p class="profile-exhibition-detail">문구전 2026 여름</p>
            <p class="profile-exhibition-detail">2026.07.04 - 07.05 (2일간)</p>
            <p class="profile-exhibition-detail">양재 aT센터</p>
          </div>
        </article>
      </div>
    </section>
  </main>

  <script src="./js/profile-gallery.js"></script>
  <script src="./js/protect-images.js"></script>
</body>
</html>
